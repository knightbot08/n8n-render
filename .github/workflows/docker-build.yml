name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # updated to v4 (better)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Optional: Build custom main n8n image (keep if you need customizations) ──
      - name: Build and push main n8n image
        uses: docker/build-push-action@v6   # updated to v6
        with:
          context: .
          file: Dockerfile                  # your existing Dockerfile for n8n
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/n8n-render:latest

      # ── Required: Build custom runners image ──
      - name: Build and push custom runners image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runners          # ← the new file above
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/n8n-runners-exceljs:latest
